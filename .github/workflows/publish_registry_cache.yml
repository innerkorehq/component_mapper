name: Publish registry cache

# Runs weekly + on-demand. Fetches all Shadcn registry component metadata,
# serialises the signature index, and uploads it as a GitHub Release asset.
# The sitesudharo Dockerfile can download it with:
#   curl -L https://github.com/ORG/component_mapper/releases/latest/download/signature_index.json

on:
  schedule:
    - cron: "0 2 * * 1"   # every Monday at 02:00 UTC
  workflow_dispatch:        # manual trigger

jobs:
  build-registry:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Build signature index
        run: |
          python - <<'EOF'
          import asyncio, pathlib
          from component_mapper import MapperPipeline, MapperSettings
          from component_mapper.config import SignatureIndexConfig, MappingCacheConfig, LiteLLMConfig

          out = pathlib.Path("dist-cache")
          out.mkdir(exist_ok=True)

          async def build():
              s = MapperSettings(
                  _env_file=None,
                  signature_index=SignatureIndexConfig(
                      index_cache_path=str(out / "signature_index.json"),
                      custom_registry_path=str(out / "custom_registry.json"),
                  ),
                  mapping_cache=MappingCacheConfig(cache_path=str(out / "mapping_cache.json")),
                  litellm=LiteLLMConfig(config_path="", api_key_env="LLM_API_KEY"),
              )
              p = MapperPipeline(s)
              await p.initialize()
              n = len(p.signature_index.get_all_component_names())
              await p.shutdown()
              print(f"Built: {n} components  →  {out}/signature_index.json")

          asyncio.run(build())
          EOF

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: registry-cache-latest
          name: "Registry cache (auto-updated)"
          body: "Pre-built component-mapper signature index. Downloaded by Docker build."
          files: |
            dist-cache/signature_index.json
            dist-cache/custom_registry.json
          token: ${{ secrets.GITHUB_TOKEN }}
